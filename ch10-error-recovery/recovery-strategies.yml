# 書籍「Claude Code マルチエージェント実践ガイド」第10章
# 失敗モード4分類とリカバリー戦略

# --- カテゴリ1: ツール失敗（Tool Failure） ---
ツール失敗への対応:
  即時リトライ:
    条件: タイムアウト、一時的なネットワークエラー
    最大回数: 3回
    バックオフ: 指数（1秒, 2秒, 4秒）

  代替ツール:
    条件: 特定のツールが継続的に失敗
    例: Web検索が失敗 → ローカルドキュメントを参照

  エージェントへの通知:
    条件: リトライが全て失敗
    内容: "GitHubツールが利用不可です。代替手段を検討してください"

# --- カテゴリ2: 判断失敗（Decision Failure） ---
判断失敗への対応:
  ツール選択ガイド:
    方法: プロンプトに明示的なヒューリスティクスを含める
    例: "ローカルの問題には、まずログファイルを確認する"

  自己検証:
    方法: 結果の妥当性をチェックするステップを追加
    例: "提案する解決策が、実際のエラーメッセージと一致するか確認する"

  思考ステップの挿入:
    方法: アクション前に計画を立てさせる
    例: "ツールを使う前に、なぜそのツールを選ぶか理由を述べよ"

# --- カテゴリ3: 状態破壊（State Corruption） ---
状態破壊への対応:
  回帰テスト:
    方法: 変更前にテストを実行し、変更後に再実行する
    実装: CIパイプライン、pre-commitフック

  Gitチェックポイント:
    方法: 変更前にコミットし、問題発生時にリバートする
    実装: "各機能実装後にコミットすること"

  段階的変更:
    方法: 大きな変更を小さなステップに分割する
    実装: "一度に変更するファイルは3つ以内"

  Worktree分離:
    方法: サブエージェントにworktreeで隔離実行させる
    実装: isolation: worktree フロントマター

# --- カテゴリ4: コンテキスト劣化（Context Degradation） ---
コンテキスト劣化への対応:
  構造化ノートテイキング:
    方法: 重要な発見と決定を外部ファイルに記録する
    実装: NOTES.md、claude-progress.txt

  適切なコンパクション:
    方法: 古いツール結果を削除し、要約を保持する
    実装: Claude Codeの自動コンパクション

  サブエージェントへの委譲:
    方法: 重い作業を別のクリーンなコンテキストで実行する
    実装: Agent ツールで新しいサブエージェントを起動

  セッション分割:
    方法: 長いセッションを意図的に区切る
    実装: "10回以上のツール呼び出し後、進捗を記録して新セッションを開始"
