# Multi-Agent Development with Claude Code -- Chapter 10
# Four Failure Mode Categories and Recovery Strategies

# --- Category 1: Tool Failure ---
Tool Failure Recovery:
  Immediate Retry:
    condition: "Timeouts, transient network errors"
    max_attempts: 3
    backoff: "Exponential (1s, 2s, 4s)"

  Alternative Tool:
    condition: A specific tool fails persistently
    example: "Web search fails -> consult local documentation instead"

  Notify Agent:
    condition: All retries exhausted
    message: "GitHub tool is unavailable. Consider alternative approaches"

# --- Category 2: Decision Failure ---
Decision Failure Recovery:
  Tool Selection Guide:
    method: Include explicit heuristics in the prompt
    example: "For local issues, check log files first"

  Self-Verification:
    method: Add a step to check result validity
    example: "Verify the proposed fix matches the actual error message"

  Insert Thinking Step:
    method: Make the agent plan before acting
    example: "Before using a tool, state why you chose it"

# --- Category 3: State Corruption ---
State Corruption Recovery:
  Regression Tests:
    method: "Run tests before changes, re-run after"
    implementation: "CI pipelines, pre-commit hooks"

  Git Checkpoints:
    method: "Commit before changes, revert if problems occur"
    implementation: "Commit after each feature implementation"

  Incremental Changes:
    method: Break large changes into small steps
    implementation: "Modify no more than 3 files at a time"

  Worktree Isolation:
    method: Have subagents execute in isolated worktrees
    implementation: "isolation: worktree frontmatter"

# --- Category 4: Context Degradation ---
Context Degradation Recovery:
  Structured Note-Taking:
    method: Record key findings and decisions in external files
    implementation: "NOTES.md, claude-progress.txt"

  Appropriate Compaction:
    method: "Remove old tool results, retain summaries"
    implementation: Claude Code automatic compaction

  Delegate to Subagent:
    method: Offload heavy work to a fresh context
    implementation: Spawn a new subagent via the Agent tool

  Session Splitting:
    method: Intentionally break long sessions into segments
    implementation: "After 10+ tool calls, record progress and start a new session"
