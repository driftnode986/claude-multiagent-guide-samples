# 書籍「Claude Code マルチエージェント実践ガイド」第10章
# グレースフルデグレードの4段階レベル

レベル1: フル機能
  全ツールが利用可能、全サブエージェントが動作

レベル2: 部分的デグレード
  一部のMCPサーバーが利用不可
  対応:
    - 代替ツールで作業を継続
    - 利用不可の機能をスキップし、後で再試行

レベル3: 最小限動作
  外部ツールが全て利用不可
  対応:
    - ローカルのRead/Grep/Globのみで作業
    - できる範囲の作業を完了させる

レベル4: 安全な停止
  コンテキストが劣化し、正確な判断が困難
  対応:
    - 進捗を記録してセッションを終了
    - 次のセッションで新しいコンテキストから再開
